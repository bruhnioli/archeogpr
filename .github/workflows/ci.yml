name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: pytest / ruff / mypy / vault
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install archaeogpr (with dev extras)
        run: pip install -e ".[dev]"

      - name: ruff format --check
        run: ruff format --check .

      - name: ruff check
        run: ruff check .

      - name: mypy
        run: mypy src/archaeogpr

      - name: pytest
        run: pytest -v

      - name: Validate Obsidian vault
        run: python scripts/validate_obsidian_vault.py obsidian/ArchaeoGPR_Vault
